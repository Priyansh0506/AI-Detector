<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Detector</title>

  <!-- tensorflow core - coco-ssd iske upar hi kaam karta hai -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
  <!-- person detection ke liye - GUVI project mein yahi tha originally -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
  <!-- hand pose - baad mein add kiya jab gesture feature banana tha -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection@2.0.1/dist/hand-pose-detection.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="header">
    <div class="header-left">
      <h1>AI <span>Detector</span></h1>
      <p>Person detection · Hand gesture recognition · Runs 100% in browser</p>
    </div>
    <div style="display:flex; align-items:center; gap:10px;">
      <div class="live-badge">
        <div class="live-dot" id="live-dot"></div>
        LIVE
      </div>
      <button class="theme-toggle" id="theme-toggle">🌙 <span>Light</span></button>
    </div>
  </div>

  <div class="camera-wrapper">
    <div class="cam-label">Camera Feed</div>
    <div class="fps-badge" id="fps-display">-- FPS</div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
  </div>

  <div class="stats-section">
    <div class="stat-card" id="card-status">
      <div class="stat-icon">👁️</div>
      <div class="stat-label">Status</div>
      <div class="stat-value" id="val-status">Scanning</div>
    </div>
    <div class="stat-card" id="card-count">
      <div class="stat-icon">👤</div>
      <div class="stat-label">People</div>
      <div class="stat-value" id="val-count">0</div>
    </div>
    <div class="stat-card" id="card-conf">
      <div class="stat-icon">🎯</div>
      <div class="stat-label">Confidence</div>
      <div class="stat-value" id="val-conf">--%</div>
    </div>
    <div class="stat-card" id="card-gesture">
      <div class="stat-icon" id="gesture-icon">✋</div>
      <div class="stat-label">Gesture</div>
      <div class="stat-value" id="val-gesture" style="font-size:0.85rem;">—</div>
    </div>
  </div>

  <div class="prediction-row">
    <div class="prediction-box">
      <div class="pred-left">
        <div class="label">Person Detection</div>
        <div class="value" id="main-label">Initializing...</div>
      </div>
      <div class="pred-right">
        <div class="big" id="main-conf">--</div>
        <div class="small">Confidence %</div>
      </div>
    </div>
    <div class="prediction-box">
      <div class="pred-left">
        <div class="label">Hand Gesture</div>
        <div class="value" id="gesture-label">Loading...</div>
      </div>
      <div class="pred-right">
        <div class="big" id="gesture-emoji">🤔</div>
        <div class="small">Detected</div>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <span id="status">Starting up...</span>
    <div class="model-tags">
      <span class="tag" id="tag-coco">COCO-SSD</span>
      <span class="tag" id="tag-mp">MediaPipe</span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
